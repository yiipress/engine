name: Run Tests

on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
    env:
      PIE_VERSION: '1.4.7'
      PIE_SHA256: 'e8d27c100e85720f374a55f79d63fa8d686dedabc9ccbc6567085e0baf646d55'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        if: matrix.os == 'windows-2022'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Install extensions with PIE
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $pieUrl = "https://github.com/php/pie/releases/download/$env:PIE_VERSION/pie.phar"
          Invoke-WebRequest $pieUrl -OutFile pie.phar
          $actualSha256 = (Get-FileHash pie.phar -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $env:PIE_SHA256) {
            throw "Unexpected PIE checksum: $actualSha256"
          }
          php pie.phar install pecl/yaml iliaal/mdparser yiipress/highlighter

      - name: Set up Docker Buildx
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-buildx-action@v3

      - name: Build test Docker image
        if: matrix.os == 'ubuntu-latest'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: dev
          push: false
          load: true
          tags: engine:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install dependencies
        if: matrix.os == 'windows-2022'
        run: >
          composer install --no-progress --no-interaction
          --ignore-platform-req=ext-inotify
          --ignore-platform-req=ext-pcntl
          --ignore-platform-req=ext-posix

      - name: Run tests in Docker
        if: matrix.os == 'ubuntu-latest'
        run: |
          user_id="$(id -u):$(id -g)"
          docker run --rm \
            --user "${user_id}" \
            -v ${{ github.workspace }}:/app \
            --env-file docker/test/.env \
            engine:test \
            bash -c "composer install --no-progress --no-interaction && ./vendor/bin/phpunit"

      - name: Run tests on Windows
        if: matrix.os == 'windows-2022'
        run: php ./vendor/bin/phpunit
