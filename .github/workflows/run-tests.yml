name: Run Tests

on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  portable-workers:
    name: Portable workers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      APP_DEBUG: 'false'
      APP_ENV: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-2022]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Install test dependencies
        run: composer install --no-progress --no-interaction --ignore-platform-reqs

      - name: Test portable worker processes
        run: vendor/bin/phpunit tests/Unit/Build/PortableWorkerPoolTest.php

  test:
    name: Linux PHPUnit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build test Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./docker/Dockerfile
          target: dev
          push: false
          load: true
          tags: engine:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          user_id="$(id -u):$(id -g)"
          docker run --rm \
            --user "${user_id}" \
            -v ${{ github.workspace }}:/app \
            --env-file docker/test/.env \
            engine:test \
            bash -c "composer install --no-progress --no-interaction && ./vendor/bin/phpunit"

  windows:
    name: Windows binary tests
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Install UPX
        run: choco install upx -y --no-progress

      - name: Cache Windows package dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~\AppData\Local\Composer\files
            ~\.cargo\git
            ~\.cargo\registry
            runtime\package-windows\app\vendor
            runtime\package-windows\static-php-cli
          key: tests-windows-package-${{ runner.os }}-${{ hashFiles('composer.lock', 'build/package-windows.ps1') }}
          restore-keys: |
            tests-windows-package-${{ runner.os }}-

      - name: Build Windows binary
        shell: pwsh
        run: build/package-windows.ps1 -DistDir dist/windows-amd64

      - name: Run Windows binary tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binary = (Resolve-Path "dist/windows-amd64/yiipress.exe").Path

          function Invoke-YiiPress {
              param(
                  [Parameter(ValueFromRemainingArguments = $true)]
                  [string[]] $Arguments
              )

              & $binary @Arguments
              if ($LASTEXITCODE -ne 0) {
                  throw "yiipress.exe failed with exit code ${LASTEXITCODE}: $($Arguments -join ' ')"
              }
          }

          Invoke-YiiPress "--help"

          $sitePath = Join-Path $env:RUNNER_TEMP "yiipress-windows-site"
          if (Test-Path $sitePath) {
              Remove-Item $sitePath -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $sitePath | Out-Null

          Push-Location $sitePath
          try {
              Invoke-YiiPress "init"
              Invoke-YiiPress "new" "Hello Windows" "--collection=blog"
              Set-Content -Path "content/index.md" -Encoding utf8NoBOM -Value @(
                  "---"
                  "title: Home"
                  "permalink: /"
                  "---"
                  ""
                  "Welcome from Windows."
              )
              1..128 | ForEach-Object {
                  Set-Content -Path "content/blog/worker-$_.md" -Encoding utf8NoBOM -Value @(
                      "---"
                      "title: Worker $_"
                      "---"
                      ""
                      "Rendered by a portable worker."
                  )
              }
              $buildOutput = & $binary "build" "--no-cache" "--workers=2" 2>&1
              if ($LASTEXITCODE -ne 0) {
                  throw "Parallel build failed with exit code ${LASTEXITCODE}: $($buildOutput -join [Environment]::NewLine)"
              }
              if (($buildOutput -join [Environment]::NewLine) -notmatch "using\s+2\s+workers") {
                  throw "Expected the build to use two workers: $($buildOutput -join [Environment]::NewLine)"
              }
              Invoke-YiiPress "check:links"

              if (!(Test-Path "output/index.html")) {
                  throw "Expected output/index.html to be generated."
              }
              if (!(Select-String -Path "output/blog/hello-windows/index.html" -Pattern "Hello Windows" -Quiet)) {
                  throw "Expected generated blog page to contain the test title."
              }

              Invoke-YiiPress "clean"
              if (Test-Path "output") {
                  throw "Expected clean to remove the generated output directory."
              }
          } finally {
              Pop-Location
          }

  macos:
    name: macOS binary tests
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-apple-darwin

      - name: Install macOS package dependencies
        run: |
          brew install autoconf automake bison re2c pkgconf upx
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: Cache macOS package dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.composer/cache/files
            ~/.cargo/git
            ~/.cargo/registry
            runtime/package-macos/app/vendor
            runtime/package-macos/static-php-cli
          key: tests-macos-package-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('composer.lock', 'build/package-macos.sh', 'build/static-php/*.php') }}
          restore-keys: |
            tests-macos-package-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS binary
        run: make package-macos PACKAGE_MACOS_ARCH=arm64 PACKAGE_MACOS_DIST=dist/macos-arm64

      - name: Run macOS binary tests
        run: |
          set -euo pipefail

          binary="$(pwd)/dist/macos-arm64/yiipress"
          "$binary" --help

          site_path="${RUNNER_TEMP}/yiipress-macos-site"
          rm -rf "$site_path"
          mkdir -p "$site_path"
          cd "$site_path"

          "$binary" init
          "$binary" new "Hello macOS" --collection=blog
          printf '%s\n' \
            '---' \
            'title: Home' \
            'permalink: /' \
            '---' \
            '' \
            'Welcome from macOS.' > content/index.md
          "$binary" build --no-cache
          "$binary" check:links

          test -f output/index.html
          grep -Fq 'Hello macOS' output/blog/hello-macos/index.html

          "$binary" clean
          test ! -d output
