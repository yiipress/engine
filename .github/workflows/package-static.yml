name: Package Static Builds

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: package-static-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-static

jobs:
  linux:
    name: Linux static binary, PHAR, and distroless image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract distroless image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=nightly,enable={{is_default_branch}}
            type=sha,prefix=nightly-,enable={{is_default_branch}}

      - name: Build Linux and PHAR artifacts
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./docker/Dockerfile
          target: package-static-artifacts
          outputs: type=local,dest=dist/linux-amd64
          cache-from: type=gha,scope=package-linux-amd64
          cache-to: type=gha,scope=package-linux-amd64,mode=max
          platforms: linux/amd64

      - name: Smoke test Linux binary
        run: ./dist/linux-amd64/yiipress --help

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yiipress-linux-amd64
          path: dist/linux-amd64/yiipress
          if-no-files-found: error

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yiipress-phar
          path: dist/linux-amd64/yiipress.phar
          if-no-files-found: error

      - name: Build and push distroless image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./docker/Dockerfile.distroless-binary
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Publish nightly Linux release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p assets
          tar -C dist/linux-amd64 -czf assets/yiipress-linux-amd64.tar.gz yiipress
          sha256sum assets/yiipress-linux-amd64.tar.gz > assets/SHA256SUMS
          short_sha="${GITHUB_SHA::12}"
          nightly_tag="nightly-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${short_sha}"

          {
            printf '# Nightly %s\n\n' "${short_sha}"
            printf 'Built from `%s` on `%s`.\n\n' "${GITHUB_SHA}" "${GITHUB_REF_NAME}"
            printf 'Nightly tag: `%s`.\n\n' "${nightly_tag}"
            printf '%s\n\n' 'This immutable prerelease is created after a successful package build on `master`.'
            printf '%s\n' 'It is intended for testing unreleased YiiPress changes in site build workflows.'
          } > nightly-release-notes.md

          gh release create "${nightly_tag}" assets/* \
            --target "${GITHUB_SHA}" \
            --title "Nightly ${short_sha}" \
            --notes-file nightly-release-notes.md \
            --prerelease \
            --latest=false

  windows:
    name: Windows static binary
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Install UPX
        run: choco install upx -y --no-progress

      - name: Cache Windows package dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~\AppData\Local\Composer\files
            ~\.cargo\git
            ~\.cargo\registry
            runtime\package-windows\app\vendor
            runtime\package-windows\static-php-cli
          key: windows-package-${{ runner.os }}-${{ hashFiles('composer.lock', 'build/package-windows.ps1') }}
          restore-keys: |
            windows-package-${{ runner.os }}-

      - name: Build Windows artifacts
        shell: pwsh
        run: build/package-windows.ps1 -DistDir dist/windows-amd64

      - name: Smoke test Windows binary
        shell: pwsh
        run: ./dist/windows-amd64/yiipress.exe --help

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yiipress-windows-amd64
          path: dist/windows-amd64/yiipress.exe
          if-no-files-found: error

  macos:
    name: macOS static binary
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.5'
          coverage: none

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-apple-darwin

      - name: Install macOS package dependencies
        run: |
          brew install autoconf automake bison re2c pkgconf upx
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: Cache macOS package dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.composer/cache/files
            ~/.cargo/git
            ~/.cargo/registry
            runtime/package-macos/app/vendor
            runtime/package-macos/static-php-cli
          key: macos-package-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('composer.lock', 'build/package-macos.sh', 'build/static-php/*.php') }}
          restore-keys: |
            macos-package-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS artifacts
        run: make package-macos PACKAGE_MACOS_ARCH=arm64 PACKAGE_MACOS_DIST=dist/macos-arm64

      - name: Smoke test macOS binary
        run: ./dist/macos-arm64/yiipress --help

      - name: Pack macOS artifact
        run: tar -C dist/macos-arm64 -czf dist/yiipress-macos-arm64.tar.gz yiipress

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yiipress-macos-arm64
          path: dist/yiipress-macos-arm64.tar.gz
          if-no-files-found: error
